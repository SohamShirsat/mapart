<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- background -->
  <rect width="64" height="64" rx="12" fill="#070C18"/>
  <!-- city grid -->
  <line x1="0" y1="16" x2="64" y2="10" stroke="#131E32" stroke-width="0.6"/>
  <line x1="0" y1="30" x2="64" y2="24" stroke="#131E32" stroke-width="0.6"/>
  <line x1="0" y1="44" x2="64" y2="38" stroke="#131E32" stroke-width="0.6"/>
  <line x1="0" y1="58" x2="64" y2="52" stroke="#131E32" stroke-width="0.6"/>
  <line x1="12" y1="0" x2="8"  y2="64" stroke="#131E32" stroke-width="0.6"/>
  <line x1="26" y1="0" x2="22" y2="64" stroke="#131E32" stroke-width="0.6"/>
  <line x1="40" y1="0" x2="36" y2="64" stroke="#131E32" stroke-width="0.6"/>
  <line x1="54" y1="0" x2="50" y2="64" stroke="#131E32" stroke-width="0.6"/>
  <line x1="0"  y1="0" x2="64" y2="64" stroke="#131E32" stroke-width="0.5"/>
  <line x1="32" y1="0" x2="64" y2="42" stroke="#131E32" stroke-width="0.5"/>
  <!-- intersection nodes -->
  <circle cx="13" cy="16" r="1.1" fill="#1C2D48"/>
  <circle cx="27" cy="24" r="1.1" fill="#1C2D48"/>
  <circle cx="40" cy="10" r="1.1" fill="#1C2D48"/>
  <circle cx="51" cy="38" r="1.1" fill="#1C2D48"/>
  <circle cx="22" cy="44" r="1.1" fill="#1C2D48"/>
  <circle cx="36" cy="52" r="1.1" fill="#1C2D48"/>
  <!-- glow layer -->
  <path d="M12,52 C12,46 13,38 14,30 C15,24 17,20 20,19 C24,17 28,28 32,36 C36,28 40,17 44,19 C47,20 49,26 50,32 C51,39 52,46 52,52"
    stroke="#00E87A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.2"/>
  <!-- M trace -->
  <path d="M12,52 C12,46 13,38 14,30 C15,24 17,20 20,19 C24,17 28,28 32,36 C36,28 40,17 44,19 C47,20 49,26 50,32 C51,39 52,46 52,52"
    stroke="#00E87A" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- start dot -->
  <circle cx="12" cy="52" r="3.2" fill="#00E87A"/>
</svg>
